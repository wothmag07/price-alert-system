services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pas-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pas-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  postgres:
    image: postgres:16-alpine
    container_name: pas-postgres
    environment:
      POSTGRES_DB: price_alerts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  price-ingestion:
    build: ./services/price-ingestion
    container_name: pas-price-ingestion
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      POSTGRES_HOST: postgres

  notification-service:
    build: ./services/notification-service
    container_name: pas-notification
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: price_alerts
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      FROM_EMAIL: "${FROM_EMAIL:-alerts@pricealert.dev}"

  analytics-service:
    build: ./services/analytics-service
    container_name: pas-analytics
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis

  alert-engine:
    build: ./services/alert-engine
    container_name: pas-alert-engine
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: price_alerts

  api-server:
    build: ./services/api-server
    container_name: pas-api-server
    depends_on:
      - kafka
      - redis
      - postgres
    ports:
      - "3000:3000"
    environment:
      API_PORT: "3000"
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: price_alerts
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"

volumes:
  zookeeper-data:
  kafka-data:
  postgres-data:
  redis-data:
